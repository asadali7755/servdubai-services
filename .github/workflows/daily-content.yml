name: Daily AI Content Update

on:
  schedule:
    # Roz subah 8 AM Pakistan/UAE time (UTC+5 = 3:00 AM UTC)
    - cron: '0 3 * * *'

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Step 1: Checkout with write permissions
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: 001-service-hub-website

      # Step 2: Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install Python dependencies
        run: |
          pip install -r uae-service-hub/agents/requirements.txt

      # Step 4: Run AI agents (home page + all 11 service pages)
      - name: Run Daily Content Agents
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd uae-service-hub/agents
          python run_agents.py

      # Step 5: Commit and push all updated JSON files
      - name: Commit and push updated content
        run: |
          git config --local user.email "ai-agent@servedubai.com"
          git config --local user.name "Al Haya AI Agent"
          git add uae-service-hub/public/daily-content.json
          git add uae-service-hub/public/service-content/
          if git diff --staged --quiet; then
            echo "No content changes today"
          else
            git commit -m "🤖 Daily content update $(date +'%Y-%m-%d') — home + 11 services"
            git push origin 001-service-hub-website
          fi
